<mat-sidenav-container class="main-wrapper">
  
  <mat-sidenav 
    #sidenav 
    [(opened)]="isMenuOpen"     
    mode="over"
    class="sidebar-nav">
    <app-sidebar (closeMenuEmit)="closeMenu()"></app-sidebar>
  </mat-sidenav>

  <mat-sidenav-content class="content-view">
    
    <header class="top-navbar">
      <button class="menu-trigger" (click)="toggleMenu()">
        <mat-icon>{{ isMenuOpen ? 'menu_open' : 'menu' }}</mat-icon>
      </button>
      <span class="app-brand fw-bold text-primary">Socks Control</span>
    </header>

    <main class="p-4">
      <router-outlet></router-outlet>
    </main>

  </mat-sidenav-content>
</mat-sidenav-container>
