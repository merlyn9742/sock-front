<div class="dashboard-container">
  <div class="page-header d-flex justify-content-between align-items-center">
    <div>
      <h1 class="mat-h1 mb-0">Gestión de Categorías</h1>
      <span class="text-muted">Administra las agrupaciones de tus productos de mayoreo</span>
    </div>
    <button mat-fab extended color="primary" (click)="openModal()" class="add-button">
      <mat-icon>add</mat-icon>
      Nueva Categoría
    </button>
  </div>

  <mat-card class="table-card mat-elevation-z3" *ngIf="categoriesObs$ | async as categories">
    <mat-card-content class="p-0">
      <table mat-table [dataSource]="categories" class="w-100">

        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef> ID </th>
          <td mat-cell *matCellDef="let cat"> 
            <span class="id-badge">#{{cat.id}}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef> Nombre de Categoría </th>
          <td mat-cell *matCellDef="let cat"> 
            <div class="d-flex align-items-center">
              <div class="category-icon">{{cat.name.charAt(0)}}</div>
              <span class="fw-medium">{{cat.name}}</span>
            </div>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-end"> Acciones </th>
          <td mat-cell *matCellDef="let cat" class="text-end">
            <button mat-icon-button color="accent" matTooltip="Editar" (click)="edit(cat)">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" matTooltip="Eliminar" (click)="delete(cat.id!)">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="['id', 'name', 'actions']"></tr>
        <tr mat-row *matRowDef="let row; columns: ['id', 'name', 'actions'];" class="category-row"></tr>

        <tr class="mat-row" *matNoDataRow>
          <td class="mat-cell text-center py-5" colspan="3">
            <mat-icon class="large-icon">inventory_2</mat-icon>
            <p>No se encontraron categorías registradas.</p>
          </td>
        </tr>
      </table>
    </mat-card-content>
  </mat-card>
</div>
