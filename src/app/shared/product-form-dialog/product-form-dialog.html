<div class="dialog-header d-flex justify-content-between align-items-center p-3">
  <h2 mat-dialog-title class="m-0 fw-bold">
    <mat-icon class="align-middle me-2 text-primary">
      {{ data.product ? 'edit_note' : 'add_circle_outline' }}
    </mat-icon>
    {{ data.product ? 'Editar' : 'Nuevo' }} Producto
  </h2>
  <button mat-icon-button (click)="onNoClick()" class="close-btn">
    <mat-icon>close</mat-icon>
  </button>
</div>

<mat-dialog-content class="custom-dialog-content">
  <form [formGroup]="productForm" class="row g-3 mt-1">
    
    <div class="col-12">
      <mat-form-field appearance="outline" class="w-100 no-wrapper">
        <mat-label>Nombre del Producto</mat-label>
        <input matInput formControlName="name" placeholder="Ej. Calceta Deportiva Algodón">
        <mat-icon matSuffix class="text-muted">inventory</mat-icon>
        <mat-error *ngIf="productForm.get('name')?.hasError('required')">El nombre es obligatorio</mat-error>
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Categoría</mat-label>
        <mat-select formControlName="categoryId">
          <mat-option *ngFor="let cat of data.categories" [value]="cat.id">
            {{ cat.name }}
          </mat-option>
        </mat-select>
        <mat-icon matSuffix class="text-muted">category</mat-icon>
      </mat-form-field>
    </div>

    <div class="col-md-6">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Género</mat-label>
        <mat-select formControlName="gender">
          <mat-option value="Hombre">Hombre</mat-option>
          <mat-option value="Mujer">Mujer</mat-option>
          <mat-option value="Unisex">Unisex</mat-option>
          <mat-option value="Niño">Niño</mat-option>
          <mat-option value="Niña">Niña</mat-option>
        </mat-select>
        <mat-icon matSuffix class="text-muted">wc</mat-icon>
      </mat-form-field>
    </div>

    <mat-divider class="my-2"></mat-divider>

    <div class="col-md-4">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Stock Inicial</mat-label>
        <input matInput type="number" formControlName="currentStock">
        <mat-icon matSuffix class="text-muted">numbers</mat-icon>
      </mat-form-field>
    </div>

    <div class="col-md-4">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Alerta Mínima</mat-label>
        <input matInput type="number" formControlName="minStockAlert">
        <mat-icon matSuffix class="text-muted">priority_high</mat-icon>
      </mat-form-field>
    </div>

    <div class="col-md-4">
      <mat-form-field appearance="outline" class="w-100">
        <mat-label>Precio Base</mat-label>
        <input matInput type="number" formControlName="basePrice">
        <span matPrefix class="text-success fw-bold me-1">$</span>
      </mat-form-field>
    </div>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end" class="p-3 bg-light">
  <button mat-button (click)="onNoClick()" class="px-4">Cancelar</button>
  <button 
    mat-flat-button 
    color="primary" 
    [disabled]="productForm.invalid" 
    (click)="save()" 
    class="px-4 rounded-pill shadow-sm">
    <mat-icon class="me-1">save</mat-icon>
    {{ data.product ? 'Actualizar' : 'Guardar' }}
  </button>
</mat-dialog-actions>
