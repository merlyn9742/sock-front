<div class="dialog-header d-flex justify-content-between align-items-center p-3">
      <h2 mat-dialog-title class="m-0 fw-bold text-primary">
        <mat-icon class="align-middle me-2">person_add</mat-icon>
        {{ data.customer ? 'Editar' : 'Nuevo' }} Cliente
      </h2>
      <button mat-icon-button (click)="onNoClick()" class="close-btn">
        <mat-icon>close</mat-icon>
      </button>
    </div>

    <mat-dialog-content class="pt-3">
      <form [formGroup]="customerForm" class="row g-3">
        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Nombre Completo</mat-label>
            <input matInput formControlName="name" placeholder="Ej. Shirley Arellano">
            <mat-icon matSuffix>badge</mat-icon>
            <mat-error *ngIf="customerForm.get('name')?.hasError('required')">El nombre es obligatorio</mat-error>
          </mat-form-field>
        </div>

        <div class="col-12">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Teléfono / WhatsApp</mat-label>
            <input matInput formControlName="phone" placeholder="Ej. 2291234567">
            <mat-icon matSuffix>phone_iphone</mat-icon>
            <mat-hint>Incluye código de país si es necesario</mat-hint>
          </mat-form-field>
        </div>
      </form>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="p-3 bg-light mt-3">
      <button mat-button (click)="onNoClick()">Cancelar</button>
      <button mat-flat-button color="primary" 
              [disabled]="customerForm.invalid" 
              (click)="save()" 
              class="px-4 rounded-pill">
        <mat-icon class="me-1">save</mat-icon>
        {{ data.customer ? 'Actualizar' : 'Guardar Cliente' }}
      </button>
    </mat-dialog-actions>
